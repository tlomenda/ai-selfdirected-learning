prompts:
  - id: create-prd
    raw: |
      # Create PRD

      ## Role
      a Product Manager who writes Product Requirements Documents (PRDs) for engineering-led software teams

      ## Task
      Write a developer-ready product requirements document for a Pomodoro timer application with 25-minute work intervals, 5-minute break intervals, session tracking, and a weekly productivity heat map.

      ## Context
      A Pomodoro timer is a time management tool that uses a timer to break work into intervals, traditionally 25 minutes in length, separated by short breaks. 

      Providing a developer-ready PRD requires not only the features but also the non-functional requirements, implementation environment, explicit scope boundaries, and open questions that must be resolved before implementation begins.

      It is assumed that the application will be built as a web application that runs in a browser.

      The audience for this PRD is a solo developer or small development team who will be building the application.


      ## Constraints

      1. The PRD requires the following sections:
        - Product Overview (Problem Statement & Goals)
        - Features (Personas, Use Cases & User Stories)
        - Non-Functional Requirements
        - Key Implementation Details
        - Scope Boundaries
        - Open Questions

      2. Vague language must never appear without a measurable definition (e.g., "responsive," "fast," "accurate," "easy to use")
      3. The PRD should not specify technical solutions beyond what is necessary for key implementation details.
      4. It is important to be explicit about the what is in scope and what is out of scope
      5. As part of the PRD, include a list of open questions that must be answered before implementation begins

      Product Description:
      {{product_description}}

# Route llm-rubric grading through the Claude Code CLI — no API key needed
defaultTest:
  options:
    provider: 'exec: node ./devin.js'

providers:
  - id: 'exec: node ./devin.js'
    label: sonnet
    config:
      model: sonnet
  - id: 'exec: node ./devin.js'
    label: haiku
    config:
      model: haiku

tests:
  # Test Case 1: PRD Content Quality and Completeness
  - vars:
      product_description: |
        A developer-ready PRD goes well beyond a feature list, a quality PRD should include sections that developers can use to build the best-fit product.
    assert:
      - type: llm-rubric
        value: "PRD contains a problem statement and goals to understand the why behind the product."
      - type: llm-rubric
        value: "PRD contains personas, use cases, user stories, and acceptance criteria to understand the who and what behind the product."
      - type: llm-rubric
        value: "PRD contains technical requirements and constraints to understand the how behind the product."
      - type: llm-rubric
        value: "PRD contains non-functional requirements and constraints to understand the quality and performance expectations."
      - type: llm-rubric
        value: "PRD contains scope and boundaries to understand what is in and out of scope."
      - type: llm-rubric
        value: "PRD contains success metrics and KPIs to understand the measure of success."
      - type: llm-rubric
        value: "PRD contains open questions and assumptions to understand the unknowns."
      - type: llm-rubric
        value: "PRD contains dependencies and constraints to understand the dependencies and constraints."
      - type: llm-rubric
        value: "PRD contains a changelog to understand the history of changes."
      - type: llm-rubric
        value: "The PRD does not specify framework choices, library selections, or build tooling, though it may include browser API requirements and data structure specifications."

  # Test Case 2: Timer Precision & Accuracy Specification
  - vars:
      product_description: |
        Build a Pomodoro timer with 25-minute work sessions and 5-minute breaks.
    assert:
      - type: llm-rubric
        value: "PRD explicitly defines acceptable timer drift tolerance (e.g., ±2 seconds over a 25-minute session)."
      - type: llm-rubric
        value: "PRD specifies wall-clock anchoring (Date.now()) as the timing mechanism, not tick counting."
      - type: llm-rubric
        value: "PRD addresses background tab throttling behavior and defines the required mitigation (Web Worker or visibility API recompute)."
      - type: llm-rubric
        value: "PRD names the Page Visibility API (visibilitychange) as a required dependency."
      - type: llm-rubric
        value: "Acceptance criteria are written as testable statements a QA engineer can execute."
      - type: llm-rubric
        value: "The PRD does not use the phrase 'accurate timing' without defining what accuracy means numerically."
      - type: llm-rubric
        value: "The PRD does not specify setInterval as the timer implementation without addressing drift."
      - type: llm-rubric
        value: "The PRD is not silent on what happens when the user switches tabs for 10 minutes."

  # Test Case 3: Heat Map Data Model Completeness
  - vars:
      product_description: |
        Include a weekly productivity heat map showing session history.
    assert:
      - type: llm-rubric
        value: "PRD defines the unit of each heat map cell (day, hour-block, or per-session slot)."
      - type: llm-rubric
        value: "PRD specifies what the color scale encodes (session count, total minutes, or completion rate)."
      - type: llm-rubric
        value: "PRD defines the color scale range — either fixed (e.g., 0–8 sessions) or relative to the user's personal max."
      - type: llm-rubric
        value: "PRD specifies a concrete storage schema with field names and types (e.g., { id, startTime, endTime, completed: boolean, type: 'work' | 'break' })."
      - type: llm-rubric
        value: "PRD defines storage location, data retention limit, and behavior when storage is unavailable."
      - type: llm-rubric
        value: "PRD mentions considerations for what the heat map displays before any data exists (empty state)."
      - type: llm-rubric
        value: "The PRD does not say 'store session data' without specifying the schema."
      - type: llm-rubric
        value: "The PRD does not say 'weekly heat map' without defining what 'week' means (calendar week or rolling 7 days)."
      - type: llm-rubric
        value: "The PRD is not silent on data persistence across browser restarts."
      - type: llm-rubric
        value: "The PRD does not assume a backend exists without listing it as a dependency or explicit scope decision."

  # Test Case 4: Non-Functional Requirements Specificity
  - vars:
      product_description: |
        The Pomodoro timer should be responsive, fast, and easy to use across all modern browsers.
    assert:
      - type: llm-rubric
        value: "PRD translates 'responsive' into a measurable layout requirement (e.g., 'UI must render without horizontal scrolling at viewport widths from 320px to 2560px')."
      - type: llm-rubric
        value: "PRD translates 'fast' into specific, testable performance budgets (e.g., First Contentful Paint under 1.5s on simulated 4G; timer tick updates display within 50ms of the 1-second wall-clock interval)."
      - type: llm-rubric
        value: "PRD translates 'easy to use' into observable, testable criteria — either a usability benchmark or a specific accessibility standard such as WCAG 2.1 AA compliance."
      - type: llm-rubric
        value: "PRD defines 'all modern browsers' as an explicit, versioned support matrix (e.g., Chrome, Firefox, Safari, Edge; IE not supported)."
      - type: llm-rubric
        value: "Each non-functional requirement names the tool or method used to verify it (e.g., Lighthouse for performance, axe or WAVE for accessibility, BrowserStack for cross-browser)."
      - type: llm-rubric
        value: "The PRD does not use the word 'responsive' without specifying a minimum viewport width, breakpoint behavior, or layout target."
      - type: llm-rubric
        value: "The PRD does not use the word 'fast' without a numeric threshold tied to a specific, named metric (FCP, TTI, tick latency, etc.)."
      - type: llm-rubric
        value: "The PRD does not use 'easy to use,' 'intuitive,' or 'user-friendly' as standalone requirements with no measurable proxy."
      - type: llm-rubric
        value: "The PRD does not define browser support as 'all modern browsers,' 'major browsers,' or 'evergreen browsers' without a named version floor."
      - type: llm-rubric
        value: "NFRs do not appear only as a bullet list without acceptance criteria that enable a clear pass/fail determination at QA."

  # Test Case 5: Notification & Audio Permission Flows
  - vars:
      product_description: |
        Notify the user when a work session ends and a break begins.
    assert:
      - type: llm-rubric
        value: "PRD distinguishes between in-app visual alerts, Web Notifications API alerts, and audio alerts as three separate mechanisms."
      - type: llm-rubric
        value: "PRD specifies when and how Notification.requestPermission() is triggered (e.g., after the user starts their first session, not on page load)."
      - type: llm-rubric
        value: "PRD defines the complete fallback chain: what the user sees or hears if notification permission is denied, if audio context is suspended due to no prior user gesture, and if the tab is closed."
      - type: llm-rubric
        value: "PRD defines the exact copy for each notification (work-end message and break-end message)."
      - type: llm-rubric
        value: "PRD explicitly states whether audio is required, optional with a default, or out of scope."
      - type: llm-rubric
        value: "The PRD does not say 'send a notification' without specifying the browser API or permission flow."
      - type: llm-rubric
        value: "The PRD is not silent on the user experience when notification permission is denied."
      - type: llm-rubric
        value: "The PRD does not omit the browser requirement for a prior user gesture before AudioContext can play sound."
      - type: llm-rubric
        value: "The PRD does not conflate browser push notifications (which require a Service Worker and server) with in-session Web Notifications API alerts."