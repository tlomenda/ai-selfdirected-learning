description: EDD - Create Architecture Document

prompts:
  - file://create-architecture.md

# Route llm-rubric grading through the Devin CLI — no API key needed
defaultTest:
  options:
    provider: 'exec: node ./../devin.js'

providers:
  - id: 'exec: node ./../devin.js'
    label: sonnet
    config:
      model: sonnet
  - id: 'exec: node ./../devin.js'
    label: haiku
    config:
      model: haiku
  - id: 'exec: node ./../devin.js'
    label: swe-1.6
    config:
      model: swe-1.6

tests:
  # ==========================================================================
  # POMODORO TEST CASES
  # Product description included in each test so the prompt remains generic.
  # ==========================================================================

  # TC-P1: PRD Structure and Completeness (Pomodoro)
  - description: "Architecture Document Structure"
    vars:
      product_description: file://../../domains/product-pomodoro.md
      product_prd: file://../../outcomes/pomodoro/pomodoro-prd-sonnet.md
      tech_stack: file://../../app-techstack/browser-stack.md
    assert:
      - type: llm-rubric
        value: "Contains all required sections and includes mermaid diagrams"
      - type: llm-rubric
        value: "Includes a description of the purpose, goals, and high-level architecture"
      - type: llm-rubric
        value: "Shows a C4 modeled diagrams"
      - type: llm-rubric
        value: "Includes system/application boundaries and interfaces"
      - type: llm-rubric
        value: "Includes data flow and interactions"
      - type: llm-rubric
        value: "Includes security and compliance requirements"
      - type: llm-rubric
        value: "Includes performance requirements"

  # ==========================================================================
  # TEAMPULSE TEST CASES
  # Product description included in each test so the prompt remains generic.
  # ==========================================================================

  # TC-T1: Required Sections and Document Completeness (TeamPulse)
  - description: "Architecture Document Structure with React/Node.js/PostgreSQL"
    vars:
      product_description: file://../../domains/product-teampulse.md
      product_prd: file://../../outcomes/teampulse/teampulse-prd-final.md
      tech_stack: file://../../app-techstack/PERN-stack.md
    assert:
      - type: contains-all
        value:
          - "React"
          - "Node.js"
          - "PostgreSQL"
      - type: llm-rubric
        value: "Contains required sections and includes mermaid diagrams"
      - type: llm-rubric
        value: "Includes a description of the purpose, goals, and high-level architecture"
      - type: llm-rubric
        value: "Includes DDD and C4 Modeling concepts for the architecture and design"
      - type: llm-rubric
        value: "Includes system/application boundaries and interfaces"
      - type: llm-rubric
        value: "Includes data flow and interactions"
      - type: llm-rubric
        value: "Includes security and compliance requirements"
      - type: llm-rubric
        value: "Includes performance and scalability requirements"

  # TC-T2: Required Sections and Document Completeness (TeamPulse)
  - description: "Architecture Document Structure - with Python/FastAPI/MongoDB"
    vars:
      product_description: file://../../domains/product-teampulse.md
      product_prd: ffile://../../outcomes/teampulse/teampulse-prd-final.md
      tech_stack: file://../../app-techstack/Python-stack.md
    assert:
      - type: contains-all
        value:
          - "Python"
          - "FastAPI"
          - "MongoDB"
      - type: llm-rubric
        value: "Contains required sections and includes mermaid diagrams"
      - type: llm-rubric
        value: "Includes a description of the purpose, goals, and high-level architecture"
      - type: llm-rubric
        value: "Includes DDD and C4 Modeling concepts for the architecture and design"
      - type: llm-rubric
        value: "Includes system/application boundaries and interfaces"
      - type: llm-rubric
        value: "Includes data flow and interactions"
      - type: llm-rubric
        value: "Includes security and compliance requirements"
      - type: llm-rubric
        value: "Includes performance and scalability requirements"
      