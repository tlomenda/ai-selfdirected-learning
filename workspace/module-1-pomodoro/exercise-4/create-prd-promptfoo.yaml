prompts:
  - id: create-prd
    raw: |
      # Create PRD

      ## Role
      a Product Manager who writes Product Requirements Documents (PRDs) for engineering-led software teams

      ## Task
      Write a developer-ready product requirements document for a Pomodoro timer application with 25-minute work intervals, 
      5-minute break intervals, session tracking, and a weekly productivity heat map.

      ## Context
      A Pomodoro timer is a time management tool that uses a timer to break work into intervals, traditionally 25 minutes in length, separated by short breaks. 
      Time productivity is tracked through session history and visualized in a weekly heat map where each cell represents a day block.

      Providing a developer-ready PRD requires not only the features but also the non-functional requirements, implementation environment, explicit scope boundaries, 
      and open questions that must be resolved before implementation begins.

      It is assumed that the application will be built as a web application that runs on all modern browsers. 

      The audience for this PRD is a solo developer or small development team who will be building the application.

      ## Constraints

      1. The PRD requires the following sections:
        - Product Overview (Problem Statement & Goals)
        - Features (Personas, Use Cases & User Stories)
        - Non-Functional Requirements with suggested tool or method for verification
        - Key Implementation Details
          * Define timer drift tolerance with a numeric threshold (e.g., ±2 seconds over a 25-minute session)
          * Specify that timing is anchored to wall-clock time (comparing saved timestamps) rather than counting elapsed ticks
          * Address browser throttling of background tabs and specify the required mitigation approach
        - Scope Boundaries
        - Open Questions
        - Change Log

      2. Storage Requirements Section:
        - Specify where data is stored
        - Define whether 'week' in the heat map means a calendar week (e.g., Monday–Sunday) or a rolling 7-day window.
        - Define retention policy (duration or size limit)
        - A concrete storage schema with field names and types, including:
          * Unique identifier
          * Timing fields (start/end timestamps)
          * Completion status (boolean or equivalent)
          * Session type discriminator ('work' vs 'break')
        - Describe what happens when storage fails (incognito mode, quota exceeded, disabled storage)
          * Example: "If localStorage is unavailable, the app will function in memory-only mode with a warning banner."

      3. The PRD should consider browser lifecycle, notification availability, and how the application behaves when minimized or closed
        - Define empty state behavior for first-time users (no data yet)
        - Define error state behavior when storage is unavailable
        - These are distinct scenarios requiring different messaging

      4. The application should be responsive, alert users when timers expire, and provide a clean, intuitive user interface.
        - Provide example notification copy for both work-break and break-work transitions
        - Copy should include title and body text
        - Explicitly state the audio requirement: required, optional with a default on/off state, or explicitly out of scope.
        - Specify the UX trigger for requesting browser notification permission (e.g., after the user starts their first session; never on page load)

      5. Vague language must never appear without a measurable definition (e.g., "responsive," "fast," "accurate," "easy to use")
      6. The PRD should not specify technical solutions beyond what is necessary for key implementation details
      7. It is important to be explicit about the what is in scope and what is out of scope
      8. As part of the PRD, include a list of open questions that must be answered before implementation begins

      Product Description:
      {{product_description}}

# Route llm-rubric grading through the Claude Code CLI — no API key needed
defaultTest:
  options:
    provider: 'exec: node ./devin.js'

providers:
  - id: 'exec: node ./devin.js'
    label: sonnet
    config:
      model: sonnet
  - id: 'exec: node ./devin.js'
    label: haiku
    config:
      model: haiku

tests:
  # Test Case 1: PRD Content Quality and Completeness
  - vars:
      product_description: |
        A developer-ready PRD goes well beyond a feature list, a quality PRD should include sections that developers can use to build the best-fit product.
    assert:
      - type: llm-rubric
        value: "PRD contains a problem statement and goals to understand the why behind the product."
      - type: llm-rubric
        value: "PRD contains personas, use cases, user stories, and acceptance criteria to understand the who and what behind the product."
      - type: llm-rubric
        value: "PRD contains technical requirements and constraints to understand the how behind the product."
      - type: llm-rubric
        value: "PRD contains non-functional requirements and constraints to understand the quality and performance expectations."
      - type: llm-rubric
        value: "PRD contains scope and boundaries to understand what is in and out of scope."
      - type: llm-rubric
        value: "PRD contains measurable success criteria, which may include technical benchmarks (performance, accuracy)."
      - type: llm-rubric
        value: "PRD contains open questions and assumptions to understand the unknowns."
      - type: llm-rubric
        value: "PRD contains dependencies and constraints to understand the dependencies and constraints."
      - type: llm-rubric
        value: "PRD contains a changelog to understand the history of changes."
      - type: llm-rubric
        value: "The PRD does not specify framework choices, library selections, or build tooling, though it may include browser API requirements and data structure specifications."

  # Test Case 2: Timer Precision & Accuracy Specification
  - vars:
      product_description: |
        Build a Pomodoro timer with 25-minute work sessions and 5-minute breaks.
    assert:
      - type: llm-rubric
        value: "PRD explicitly defines acceptable timer drift tolerance (e.g., ±2 seconds over a 25-minute session)."
      - type: llm-rubric
        value: "PRD specifies that timer accuracy is maintained by comparing saved timestamps (wall-clock anchoring) rather than counting timer ticks or intervals."
      - type: llm-rubric
        value: "PRD addresses background tab throttling behavior and defines the required mitigation (Web Worker or visibility API recompute)."
      - type: llm-rubric
        value: "Acceptance criteria are written to cover the core functionality."
      - type: llm-rubric
        value: "The PRD mentions what happens when the user switches tabs for an extended duration (e.g. 10 minutes)."
      - type: llm-rubric
        value: "The PRD defines what accuracy means when referring to 'accurate timing'."
      - type: llm-rubric
        value: "The PRD does not specify setInterval as the timer implementation without addressing drift."
  
  # Test Case 3: Heat Map Data Model Completeness
  - vars:
      product_description: |
        Include a weekly productivity heat map showing session history.
    assert:
      - type: llm-rubric
        value: "PRD defines the unit of each heat map cell (day, hour-block, or per-session slot)."
      - type: llm-rubric
        value: "PRD includes a visible storage schema with actual field names and types. The schema must include: (1) a unique identifier field, (2) timestamp field(s) for when the session started/ended, (3) a boolean or status field indicating completion, and (4) a field distinguishing 'work' from 'break' sessions (enum, union, or string literal type)."
      - type: llm-rubric
        value: "PRD addresses all three storage concerns: (1) location is named, (2) retention limit is specified, and (3) unavailability scenarios are described with specific fallback behavior (e.g., graceful degradation, error messages, or memory-only mode)."
      - type: llm-rubric
        value: "PRD describes what the heat map displays for a first-time user before any sessions have been completed (empty state with working storage)."
      - type: llm-rubric
        value: "The PRD defines what 'week' means (calendar week or rolling 7 days)."
      - type: llm-rubric
        value: "The PRD specifies a schema to 'store session data'."
      - type: llm-rubric
        value: "The PRD indicates the behavior of data persistence across browser restarts."
      - type: llm-rubric
        value: "The PRD does not assume a backend exists without listing it as a dependency or explicit scope decision."

  # Test Case 4: Non-Functional Requirements Specificity
  - vars:
      product_description: |
        The Pomodoro timer should be responsive, fast, and easy to use across all modern browsers.
    assert:
      - type: llm-rubric
        value: "PRD translates 'responsive' into a measurable layout requirement (e.g., 'UI must render without horizontal scrolling at viewport widths from 320px to 2560px')."
      - type: llm-rubric
        value: "PRD translates 'fast' into specific, testable performance budgets with numeric thresholds and network conditions (e.g., load time metrics, interaction latency, or timer update frequency). Each budget must be measurable and include the test condition."
      - type: llm-rubric
        value: "PRD translates 'easy to use' into observable, testable criteria — either a usability benchmark or a specific accessibility standard such as WCAG 2.1 AA compliance."
      - type: llm-rubric
        value: "PRD defines 'all modern browsers' as an explicit, versioned support matrix (e.g., Chrome, Firefox, Safari, Edge; IE not supported)."
      - type: llm-rubric
        value: "Each non-functional requirement names the tool or method used to verify it."
      - type: llm-rubric
        value: "The PRD does not use the word 'responsive' without specifying a minimum viewport width, breakpoint behavior, or layout target."
      - type: llm-rubric
        value: "NFRs do not appear only as a bullet list without acceptance criteria that enable a clear pass/fail determination at QA."

  # Test Case 5: Notification & Audio Permission Flows
  - vars:
      product_description: |
        Notify the user when a work session ends and a break begins.
    assert:
      - type: llm-rubric
        value: "PRD explicitly states whether audio is required, optional with a default, or out of scope."
      - type: llm-rubric
        value: "PRD distinguishes between in-app visual alerts and other alert mechanisms (e.g. notifications) as separate mechanisms."
      - type: llm-rubric
        value: "PRD specifies considerations for when and how permission to receive notifications is triggered (e.g., after the user starts their first session, not on page load)."
      - type: llm-rubric
        value: "PRD defines fallback considerations: what the user sees or hears if notification permission is denied."
      - type: llm-rubric
        value: "PRD provides notification copy (title and body text) for both work-end and break-end messages."
      - type: llm-rubric
        value: "The PRD does not conflate browser notifications with in-session Web Notifications API alerts."